name: Java Battleship Push Workflow

# Triggers only on Push to any branch
on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out the code from the branch
      - name: Checkout code
        uses: actions/checkout@v6

      # Set up Java 21 with Maven dependency caching
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      # Run all automated tests
      - name: Build and Test with Maven
        run: mvn -B clean verify

      # Upload the compiled JAR as a downloadable artifact
      - name: Upload JAR file
        uses: actions/upload-artifact@v6
        with:
          name: battleship-jar
          path: target/*.jar

  pmd:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      - name: Run PMD
        id: pmd
        uses: pmd/pmd-github-action@v2
        with:
          sourcePath: 'src/main/java'
          rulesets: 'category/java/errorprone.xml,category/java/codestyle.xml,category/java/design.xml,category/java/performance.xml,category/java/bestpractices.xml'
          uploadSarifReport: false

      - name: Fail if PMD violations found
        if: steps.pmd.outputs.violations != '0'
        run: exit 1