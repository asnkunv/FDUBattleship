name: Java Battleship Push Workflow

# Triggers only on Push to any branch
on:
  push:
    branches:
      - '**'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # Check out the code from the branch
      - name: Checkout code
        uses: actions/checkout@v6

      # Set up Java 21 with Maven dependency caching
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: "maven"

      # Run all automated tests
      - name: Build and Test with Maven
        run: mvn -B clean verify
      - name: Generate PMD HTML Report
        if: failure()
        run: mvn pmd:pmd

      - name: Upload PMD Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pmd-report
          path: target/site/pmd.html

      # Upload the compiled JAR as a downloadable artifact
      - name: Upload JAR file
        uses: actions/upload-artifact@v6
        with:
          name: battleship-jar
          path: target/*.jar