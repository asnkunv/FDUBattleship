name: Java Battleship PR Workflow
on:
  pull_request:
    branches: [ 'master' ]
permissions:
  contents: read
  pull-requests: write
  checks: write
env:
  MIN_COVERAGE: 70
jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      - name: Build, Test and Analyze
        run: mvn -B clean verify spotbugs:spotbugs checkstyle:checkstyle pmd:pmd

      - name: Upload JAR Artifact
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: battleship-jar
          path: target/*.jar

      - name: Upload JaCoCo HTML Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Publish JaCoCo Coverage Report
        id: jacoco
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: ${{ env.MIN_COVERAGE }}
          min-coverage-changed-files: ${{ env.MIN_COVERAGE }}
          update-comment: true
          title: "Coverage Report"
          pass-emoji: '😊'
          fail-emoji: '😢'
          comment-type: both

      - name: Fail if coverage below threshold
        if: always()
        env:
          MIN_COVERAGE: ${{ env.MIN_COVERAGE }}
        run: |
          OVERALL="${{ steps.jacoco.outputs.coverage-overall }}"
          CHANGED="${{ steps.jacoco.outputs.coverage-changed-files }}"
          if (( $(echo "$OVERALL < $MIN_COVERAGE" | bc -l) )) || \
             (( $(echo "$CHANGED < $MIN_COVERAGE" | bc -l) )); then
            echo "::error::Coverage thresholds not met! Overall: $OVERALL%, Changed: $CHANGED%"
            exit 1
          fi

      - name: PMD Check
        if: always()
        uses: pmd/pmd-github-action@v2
        id: pmd
        with:
          sourcePath: 'src/main/java'
          rulesets: 'category/java/errorprone.xml,category/java/codestyle.xml,category/java/design.xml,category/java/performance.xml,category/java/bestpractices.xml'

      - name: Fail if PMD violations found
        if: steps.pmd.outputs.violations != 0
        run: exit 1

      - name: Checkstyle
        if: always()
        uses: dbelyaev/action-checkstyle@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: 'github-pr-check'
          checkstyle_config: 'sun_checks.xml'
          level: error
          fail_level: error

      - name: SpotBugs Annotations
        if: always()
        uses: jwgmeligmeyling/spotbugs-github-action@master
        with:
          path: '**/spotbugsXml.xml'

      - name: Upload SpotBugs Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: spotbugs-report
          path: target/site/spotbugs.html

      - name: Debug Checkstyle output
        if: always()
        run: find target -name "*.html" -o -name "*.xml" | grep -i checkstyle

      - name: Upload Checkstyle Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: checkstyle-report
          path: target/reports/checkstyle.html