name: Java Battleship PR Workflow

# Triggers only on pull requests targeting master
on:
  pull_request:
    branches: [ 'master' ]

# Permissions needed to read code and post PR comments
permissions:
  contents: read
  pull-requests: write

jobs:
  quality-check:
    runs-on: ubuntu-latest
    steps:
      # Check out the code from the branch
      - name: Checkout code
        uses: actions/checkout@v6

      # Set up Java 21 with Maven dependency caching
      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: "temurin"
          cache: maven

      # Run all tests and generate JaCoCo coverage report via Maven
      - name: Build, Test and Generate Coverage
        run: mvn -B clean verify

      # Upload the compiled JAR as a downloadable artifact
      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v6
        with:
          name: battleship-jar
          path: target/*.jar

      # Upload full HTML coverage report, runs even if build fails
      - name: Upload JaCoCo HTML Report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: jacoco-report
          path: target/site/jacoco/

      # Post coverage results as PR comment and workflow summary
      # Fails if overall or changed files coverage drops below 70%
      - name: Publish JaCoCo Coverage Report
        uses: madrapps/jacoco-report@v1.7.2
        with:
          paths: target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 70
          min-coverage-changed-files: 70
          update-comment: true
          title: "Coverage Report"
          pass-emoji: '😊'
          fail-emoji: '😢'
          comment-type: both