<!DOCTYPE html>
<html lang ="en">
<head>
    <title>Battleship Board</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
<h1>BATTLESHIP</h1>
<p id="version"></p>

<!--BOARDS -->
<div class="boards-container">
    <div class="board-section">
        <h2>Your Board</h2>
        <table id="human-board"></table>
        <h2>Computer's Attack</h2>
        <p class="board-message" id="computer-message"></p>
    </div>
    <div class="board-section">
        <h2>Computer's Board</h2>
        <table id="computer-board"></table>
        <h2>Your attack</h2>
        <p class="board-message" id="message"></p>
    </div>
</div>

<!--Guesses Left label-->
<h3 id="guesses-left"></h3>

<!-- Feedback Buton -->
<button id="userFeedbackButton" onclick="handleFeedbackClick()">Submit Game Feedback</button>

<script src="script.js"></script>
</body>
</html>
